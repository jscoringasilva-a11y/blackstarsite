<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Portal do Cliente — BlackStar{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --black:    #0C0C0C;
  --black2:   #161616;
  --gold:     #C49A2A;
  --gold2:    #E0B84A;
  --white:    #F8F7F4;
  --gray:     #6A6A6A;
  --gray2:    #EFEFEC;
  --border:   #E2E0DB;
  --radius:   8px;
  --green:    #10D98A;
  --red:      #F0466E;
}

body {
  background: var(--white);
  color: var(--black);
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
}

.serif {
  font-family: 'Cormorant Garamond', serif;
}

/* ── BOTÕES ── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 24px;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 600;
  text-decoration: none;
  border: none;
  cursor: pointer;
  transition: all .2s;
  font-family: 'Inter', sans-serif;
}

.btn-gold { background: var(--gold); color: #fff; }
.btn-gold:hover { background: var(--gold2); }
.btn-dark { background: var(--black); color: #fff; }
.btn-dark:hover { background: #2c2c2c; }
.btn-ghost { background: transparent; color: var(--black); border: 1.5px solid var(--border); }
.btn-ghost:hover { border-color: var(--black); }
.btn-sm { padding: 8px 16px; font-size: 13px; }
.btn-red { background: var(--red); color: #fff; }

/* ── FORM ── */
.form-group { margin-bottom: 18px; }
label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--gray);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
input, select, textarea {
  width: 100%;
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  color: var(--black);
  font-size: 14px;
  font-family: 'Inter', sans-serif;
  outline: none;
  transition: border-color .2s;
}
input:focus, select:focus, textarea:focus { border-color: var(--gold); }

/* ── ALERTS ── */
.alert {
  padding: 14px 18px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 20px;
}
.alert-error { background: rgba(240,70,110,.1); color: var(--red); border: 1px solid rgba(240,70,110,.3); }
.alert-success { background: rgba(16,217,138,.1); color: var(--green); border: 1px solid rgba(16,217,138,.3); }

/* ── CARD ── */
.card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 28px;
}

{% block extra_style %}{% endblock %}
</style>
</head>
<body>
{% block content %}{% endblock %}
</body>
</html>
